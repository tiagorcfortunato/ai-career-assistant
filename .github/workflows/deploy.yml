name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Optional SHA to deploy (defaults to HEAD of main)"
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tests
        env:
          GROQ_API_KEY: dummy-key-for-tests
        run: pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_sha: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 10m
          envs: IMAGE_SHA,REGISTRY,IMAGE_NAME,GHCR_USER,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            export IMAGE_SHA="${{ needs.build-and-push.outputs.image_sha }}"
            export REGISTRY="${{ env.REGISTRY }}"
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"
            export GHCR_USER="${{ github.actor }}"
            export GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"

            IMAGE="${REGISTRY}/${IMAGE_NAME}:sha-${IMAGE_SHA}"
            echo "=== Deploying $IMAGE ==="

            echo "$GHCR_TOKEN" | sudo docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
            sudo docker pull "$IMAGE"

            PREVIOUS_ID=$(sudo docker ps --filter "name=chatbot" --format '{{.Image}}' | head -1 || echo "none")
            echo "Previous image: $PREVIOUS_ID"

            sudo docker stop chatbot 2>/dev/null || echo "no running container"
            sudo docker rm chatbot 2>/dev/null || echo "no container to remove"

            sudo docker run -d \
              --name chatbot \
              --restart unless-stopped \
              -p 127.0.0.1:8000:8000 \
              --env-file /home/ec2-user/chatbot.env \
              -v /home/ec2-user/chatbot-data/chroma_db:/app/chroma_db \
              -v /home/ec2-user/chatbot-data/models:/root/.cache/fastembed \
              --memory=800m \
              --memory-swap=1600m \
              "$IMAGE"

            echo "=== Waiting for /health to return 200 (max 120s) ==="
            READY=false
            for i in $(seq 1 24); do
              CODE=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/health || echo "000")
              echo "attempt $i: status=$CODE"
              if [ "$CODE" = "200" ]; then
                READY=true
                break
              fi
              sleep 5
            done

            if [ "$READY" != "true" ]; then
              echo "::error::Container did not become ready in 120s"
              sudo docker logs chatbot --tail 50
              echo "=== Rolling back ==="
              sudo docker stop chatbot || true
              sudo docker rm chatbot || true
              if [ "$PREVIOUS_ID" != "none" ]; then
                sudo docker run -d \
                  --name chatbot \
                  --restart unless-stopped \
                  -p 127.0.0.1:8000:8000 \
                  --env-file /home/ec2-user/chatbot.env \
                  -v /home/ec2-user/chatbot-data/chroma_db:/app/chroma_db \
                  -v /home/ec2-user/chatbot-data/models:/root/.cache/fastembed \
                  --memory=800m \
                  --memory-swap=1600m \
                  "$PREVIOUS_ID"
              fi
              exit 1
            fi

            echo "=== Smoke test ==="
            SMOKE=$(curl -sS -X POST http://127.0.0.1:8000/api/query \
              -H 'Content-Type: application/json' \
              -d '{"question":"Welche Tech Skills hat Tiago?","history":[]}' \
              --max-time 60 || echo "FAIL")
            echo "smoke response length: ${#SMOKE}"
            if [ "${#SMOKE}" -lt 50 ]; then
              echo "::error::Smoke test returned suspiciously short response"
              echo "$SMOKE"
              exit 1
            fi

            echo "=== Deploy successful ==="
            sudo docker image prune -f
            sudo docker ps --filter "name=chatbot"
